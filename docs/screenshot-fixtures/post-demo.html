<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABBMA Post Demo</title>
  <link rel="stylesheet" href="../../abbma.css">
  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #f8f6f2;
      color: #1b1b1b;
    }
    .page {
      max-width: 860px;
      margin: 48px auto;
      background: #fff;
      border: 1px solid #ddd4c8;
      box-shadow: 0 14px 40px rgba(26, 17, 10, 0.08);
      padding: 32px;
    }
    .postTitle h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      color: #2e4f6b;
      font-weight: 700;
    }
    .meta {
      margin-top: 10px;
      color: #6f6457;
      font-size: 14px;
    }
    .postContent {
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.65;
      color: #2f2f2f;
    }
    .divider {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="abbma-wrapper abbma-post-wrapper">
      <div class="abbma-button-group abbma-active">
        <button class="abbma-btn abbma-btn-first" title="Download Magnet" aria-label="Download Magnet">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="abbma-btn" title="Copy to Clipboard" aria-label="Copy to Clipboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        </button>
        <button class="abbma-btn abbma-btn-last" title="Append to Clipboard" aria-label="Append to Clipboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
      </div>
      <span class="abbma-status-text" style="opacity:1;">Ready</span>
    </div>

    <header class="postTitle">
      <h1>The Art of Focus by Dan Koe [M4B]</h1>
      <p class="meta">Posted March 4, 2026 in Self-Help</p>
    </header>

    <hr class="divider">

    <section class="postContent">
      <p>This screenshot shows the extension controls injected above a single audiobook post title. The native magnet link on the page is replaced with the complete magnet URI generated from info-hash and trackers.</p>
    </section>
  </main>
</body>
</html>
