<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABBMA List Demo</title>
  <link rel="stylesheet" href="../../abbma.css">
  <style>
    /* Fixture layout mirrors ABB list aesthetics so screenshots look realistic. */
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #f3f1ec;
      color: #222;
    }
    .page {
      max-width: 920px;
      margin: 42px auto;
      background: #fff;
      border: 1px solid #ddd4c8;
      padding: 28px 34px;
      box-shadow: 0 14px 40px rgba(26, 17, 10, 0.08);
    }
    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      color: #2e4f6b;
    }
    .item {
      padding: 10px 0 14px;
      border-bottom: 1px solid #efebe3;
    }
    .item:last-child { border-bottom: 0; }
    .postTitle a {
      color: #144f7d;
      text-decoration: none;
      font-size: 19px;
      font-weight: 600;
    }
    .postTitle a:hover { text-decoration: underline; }
    .meta {
      margin-top: 6px;
      color: #776d62;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Latest Audiobooks</h1>

    <!-- Ready state: controls are active and metadata is already available. -->
    <article class="item">
      <div class="abbma-wrapper abbma-list-wrapper">
        <div class="abbma-button-group abbma-active">
          <button class="abbma-btn abbma-btn-first" aria-label="Download Magnet">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
          <button class="abbma-btn" aria-label="Copy">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          </button>
          <button class="abbma-btn abbma-btn-last" aria-label="Append">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </button>
        </div>
        <span class="abbma-status-text" style="opacity:1;">Ready</span>
      </div>
      <div class="postTitle"><a href="#">Atomic Habits by James Clear</a></div>
      <div class="meta">Business / Self-Improvement</div>
    </article>

    <!-- Loading state: controls are present but intentionally disabled/pending. -->
    <article class="item">
      <div class="abbma-wrapper abbma-list-wrapper">
        <div class="abbma-button-group" style="opacity:0.5;pointer-events:none;cursor:wait;">
          <button class="abbma-btn abbma-btn-first" aria-label="Download Magnet">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
          <button class="abbma-btn" aria-label="Copy">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          </button>
          <button class="abbma-btn abbma-btn-last" aria-label="Append">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </button>
        </div>
        <span class="abbma-status-text" style="opacity:1;">Loading...</span>
      </div>
      <div class="postTitle"><a href="#">The Obstacle Is the Way by Ryan Holiday</a></div>
      <div class="meta">Psychology / Productivity</div>
    </article>

    <!-- Post-action state: status feedback reflects successful append workflow. -->
    <article class="item">
      <div class="abbma-wrapper abbma-list-wrapper">
        <div class="abbma-button-group abbma-active">
          <button class="abbma-btn abbma-btn-first" aria-label="Download Magnet">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
          <button class="abbma-btn" aria-label="Copy">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          </button>
          <button class="abbma-btn abbma-btn-last" aria-label="Append">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </button>
        </div>
        <span class="abbma-status-text" style="opacity:1;">Appended!</span>
      </div>
      <div class="postTitle"><a href="#">Deep Work by Cal Newport</a></div>
      <div class="meta">Career / Focus</div>
    </article>
  </main>
</body>
</html>
